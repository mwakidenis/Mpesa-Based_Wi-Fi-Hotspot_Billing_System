
diploiVersion: v1.0
name: WiFi Billing System
description: >
  WiFi billing system with Express/Node.js backend, integrated Next.js frontend,
  M-Pesa payments, MikroTik integration, Prisma ORM, Socket.IO, and PostgreSQL.

components:
  - name: Node.js
    identifier: node
    folder: /
    package: https://github.com/diploi/component-nodejs#v24.14.0
    env:
      include:
        - postgres.DATABASE_URL
        - name: PORT
          value: "5000"
        - name: NODE_ENV
          value: production
        - name: NEXT_PUBLIC_API_URL
          value: ""
        - name: JWT_SECRET
          value: ""
        - name: ADMIN_USERNAME
          value: admin
        - name: ADMIN_EMAIL
          value: ""
        - name: ADMIN_PASSWORD
          value: ""
        - name: MPESA_ENABLED
          value: "false"
        - name: MPESA_CONSUMER_KEY
          value: ""
        - name: MPESA_CONSUMER_SECRET
          value: ""
        - name: MPESA_SHORTCODE
          value: ""
        - name: MPESA_PASSKEY
          value: ""
        - name: MPESA_CALLBACK_URL
          value: ""
        - name: MIKROTIK_ENABLED
          value: "false"
        - name: MIKROTIK_HOST
          value: ""
        - name: MIKROTIK_USER
          value: ""
        - name: MIKROTIK_PASSWORD
          value: ""
        - name: MIKROTIK_PORT
          value: "8728"
        - name: LOAN_WIFI_DURATION_HOURS
          value: "1"
    containerCommands:
      developmentStart: npm run dev
      productionStart: npm start
    hosts:
      - identifier: app
        name: App
        endpoint: true
        port: 5000

addons:
  - name: PostgreSQL
    identifier: postgres
    package: https://github.com/diploi/addon-postgres#v18.3-url
